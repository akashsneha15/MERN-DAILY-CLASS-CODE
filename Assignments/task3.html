<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Responsive Login Page</title>
    <style>
       <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: pink, 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, magenta, yellow);
            z-index: 1;
            position: relative;
        }

        .login-container {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid goldenrod;
            border-radius: 5px;
        }

        .login-button {
            width: 100%;
            padding: 10px;
            border: none;
            background:paleturquoise;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-button:hover {
            background: violet;
            box-shadow: 0 4px 10px plum;
        }

        
        @media (max-width: 500px) {
            .login-container {
                width: 90%;
                padding: 20px;
            }

            .login-container h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    <form>
        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Enter username" required>
        </div><br><br>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password" required>
        </div> <br><br>

        
        <button class="login-button">Login</button>
    </form>
</div>

</body>
</html>
