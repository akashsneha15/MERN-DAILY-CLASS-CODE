<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media tags example</title>
  </head>
  <body>
    <h1>Audio Tag example</h1>
    <audio
      src="./Arz Kiya Hai(KoshalWorld.Com).mp3"
      controls
      loop
      autoplay
      muted
    ></audio>

    <h1>Videoo tag example</h1>
    <video src="https://youtu.be/kJBx5mQc2-k" controls autoplay></video>

    <h1>Embed google Map using iframe</h1>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d46328.120733179916!2d83.18682776379235!3d17.68414774908655!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a3969a99257eed1%3A0x8e84a34e9484f3bc!2sGajuwaka%2C%20Visakhapatnam%2C%20Andhra%20Pradesh!5e1!3m2!1sen!2sin!4v1776852040767!5m2!1sen!2sin"
      width="400"
      height="300"
      style="border: 0"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>

    <h1>Embed Youtube video using Iframe</h1>
    <iframe
      src="https://www.youtube.com/embed/DmVX-LTGqF0?si=hnvykCPY-jVwyL1G"
      frameborder="0"
    ></iframe>


    <h1>Embed web page using Iframe </h1>
    <iframe src="./job_application_form.html" frameborder="0" height="1050px" width="500px"></iframe>


    <h1>Embed website using Iframe </h1>
    <iframe src="https://www.programiz.com/python-programming/online-compiler/" frameborder="0"></iframe>


    <h1>Embed PDF file</h1>
    <iframe src="./NPTEL HT.pdf" frameborder="0"></iframe>
  </body>
</html>
