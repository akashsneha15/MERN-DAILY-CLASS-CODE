<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action=" ">
      <fieldset>
        <h1>Login Form</h1>
        <label for="">Username:</label>
        <input type="text" placeholder="username" id="uName" /><br /><br />

        <label for="">Password:</label>
        <input type="text" placeholder="password" id="psw" /><br /><br />

        <button type="submit">Submit</button>
        <button type="reset">cancel</button>
      </fieldset>
    </form>

    <script>
      let uName = document.getElementById("uName");
      let psw = document.getElementById("psw");
      let form = document.querySelector("form");

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        console.log("Username ",uName.value);
        console.log("Password ",psw.value);
        window.localStorage.setItem("Username",uName.value)
        window.localStorage.setItem("Password",psw.value)

        let storedName=localStorage.getItem("Username")
        let storedPassword=localStorage.getItem("Password")
        console.log("stored username", storedName)
        console.log("stored password", storedPassword)
      });
    </script>
  </body>
</html>
